<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한손 동영상 플레이어</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
#upload{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:16px;padding:20px}
#player{display:none;position:fixed;inset:0;background:black;overflow:hidden}
video,#youtube{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
input{width:90%;max-width:500px;padding:14px;border-radius:10px;border:0}
button{cursor:pointer}
#play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:50px;width:100px;height:100px;border-radius:50%;border:0;background:rgba(0,0,0,.7);color:white;z-index:10}
#timelineWrap{position:absolute;left:24px;top:10vh;height:78vh;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:10}
#timeline{position:relative;width:44px;height:100%;touch-action:none}
.bar{position:absolute;left:50%;transform:translateX(-50%);width:8px;height:100%;background:rgba(255,255,255,.25);border-radius:20px}
.fill{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:8px;height:0%;background:red;border-radius:20px}
.thumb{position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);width:28px;height:28px;background:red;border:2px solid white;border-radius:50%}
.time{background:rgba(0,0,0,.65);padding:5px 8px;border-radius:8px;font-size:13px}
#switch{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:36px;border:0;border-radius:50%;background:rgba(0,0,0,.7);color:white;width:70px;height:70px;z-index:10}
</style>
</head>
<body>

<div id="upload">
  <h1>한손 동영상 플레이어</h1>

  <input type="file" id="file" accept="video/*">

  <p>또는 유튜브 링크 입력</p>

  <input id="youtubeInput" placeholder="https://www.youtube.com/watch?v=..." />

  <button id="youtubeBtn">유튜브 재생</button>
</div>

<div id="player">
  <video id="video" playsinline></video>
  <div id="youtube"></div>

  <button id="play">▶</button>

  <div id="timelineWrap">
    <div class="time" id="duration">0:00</div>
    <div id="timeline">
      <div class="bar"></div>
      <div class="fill" id="fill"></div>
      <div class="thumb" id="thumb"></div>
    </div>
    <div class="time" id="current">0:00</div>
  </div>

  <button id="switch">←</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const file = document.getElementById("file");
const upload = document.getElementById("upload");
const playerView = document.getElementById("player");
const video = document.getElementById("video");
const youtubeDiv = document.getElementById("youtube");
const play = document.getElementById("play");
const timeline = document.getElementById("timeline");
const fill = document.getElementById("fill");
const thumb = document.getElementById("thumb");
const durationText = document.getElementById("duration");
const currentText = document.getElementById("current");
const switchBtn = document.getElementById("switch");
const timelineWrap = document.getElementById("timelineWrap");
const youtubeInput = document.getElementById("youtubeInput");
const youtubeBtn = document.getElementById("youtubeBtn");

let mode = "file";
let ytPlayer = null;
let ytReady = false;
let dragging = false;
let side = "left";

function formatTime(sec){
  if(!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + String(s).padStart(2,"0");
}

function getYoutubeId(url){
  const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([^&?/]+)/;
  const match = url.match(reg);
  return match ? match[1] : "";
}

function showPlayer(){
  upload.style.display = "none";
  playerView.style.display = "block";
}

file.addEventListener("change", function(e){
  const selected = e.target.files[0];
  if(!selected) return;

  mode = "file";
  youtubeDiv.style.display = "none";
  video.style.display = "block";

  video.src = URL.createObjectURL(selected);
  showPlayer();
});

youtubeBtn.addEventListener("click", function(){
  const id = getYoutubeId(youtubeInput.value);
  if(!id){
    alert("유튜브 링크를 확인해주세요.");
    return;
  }

  mode = "youtube";
  video.style.display = "none";
  youtubeDiv.style.display = "block";
  showPlayer();

  if(ytReady){
    loadYoutube(id);
  }else{
    window.pendingYoutubeId = id;
  }
});

function onYouTubeIframeAPIReady(){
  ytReady = true;
  if(window.pendingYoutubeId){
    loadYoutube(window.pendingYoutubeId);
  }
}

function loadYoutube(id){
  if(ytPlayer){
    ytPlayer.loadVideoById(id);
    return;
  }

  ytPlayer = new YT.Player("youtube", {
    videoId: id,
    playerVars: {
      controls: 0,
      playsinline: 1,
      rel: 0,
      modestbranding: 1
    },
    events: {
      onReady: function(){
        durationText.textContent = formatTime(ytPlayer.getDuration());
        setInterval(updateYoutubeTimeline, 300);
      }
    }
  });
}

play.addEventListener("click", async function(){
  if(mode === "file"){
    await video.play();
  }else{
    ytPlayer.playVideo();
  }

  play.style.display = "none";
});

video.addEventListener("click", function(){
  if(mode !== "file") return;

  if(video.paused){
    video.play();
    play.style.display = "none";
  }else{
    video.pause();
    play.style.display = "block";
  }
});

video.addEventListener("loadedmetadata", function(){
  durationText.textContent = formatTime(video.duration);
});

video.addEventListener("timeupdate", function(){
  if(mode !== "file") return;
  updateTimeline(video.currentTime, video.duration);
});

function updateYoutubeTimeline(){
  if(mode !== "youtube" || !ytPlayer || !ytPlayer.getDuration) return;

  const current = ytPlayer.getCurrentTime();
  const duration = ytPlayer.getDuration();

  updateTimeline(current, duration);
}

function updateTimeline(current, duration){
  const percent = duration ? (current / duration) * 100 : 0;

  fill.style.height = percent + "%";
  thumb.style.bottom = "calc(" + percent + "% - 14px)";
  currentText.textContent = formatTime(current);
  durationText.textContent = formatTime(duration);
}

function seek(clientY){
  const rect = timeline.getBoundingClientRect();
  const y = clientY - rect.top;

  let percent = 1 - y / rect.height;
  percent = Math.max(0, Math.min(1, percent));

  if(mode === "file"){
    video.currentTime = video.duration * percent;
  }else{
    const duration = ytPlayer.getDuration();
    ytPlayer.seekTo(duration * percent, true);
  }
}

timeline.addEventListener("pointerdown", function(e){
  dragging = true;
  seek(e.clientY);
});

timeline.addEventListener("pointermove", function(e){
  if(dragging) seek(e.clientY);
});

window.addEventListener("pointerup", function(){
  dragging = false;
});

switchBtn.addEventListener("click", function(){
  if(side === "left"){
    side = "right";
    timelineWrap.style.left = "auto";
    timelineWrap.style.right = "24px";
    switchBtn.style.right = "auto";
    switchBtn.style.left = "24px";
    switchBtn.textContent = "→";
  }else{
    side = "left";
    timelineWrap.style.right = "auto";
    timelineWrap.style.left = "24px";
    switchBtn.style.left = "auto";
    switchBtn.style.right = "24px";
    switchBtn.textContent = "←";
  }
});
</script>

</body>
</html>
